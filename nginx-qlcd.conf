# HTTP -> HTTPS
server {
  listen 80;
  server_name cdhy.com.vn;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  server_name cdhy.com.vn;

  ssl_certificate /etc/letsencrypt/live/cdhy.com.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cdhy.com.vn/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header X-Frame-Options DENY;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  client_max_body_size 50M;
  proxy_connect_timeout 60s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  # API endpoints - map /api to /api/v1 on backend
  location /api/ {
    rewrite ^/api/(.*) /api/v1/$1 break;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # Health
  location /health {
    proxy_pass http://127.0.0.1:3000/health;
    access_log off;
  }

  # Legacy backend routes (commented out - using /api/ instead)
  # location /thoi-gian-cap-nhat-doan-so/ {
  #   proxy_pass http://127.0.0.1:3000/thoi-gian-cap-nhat-doan-so/;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection 'upgrade';
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto https;
  # }

  # location /bao-cao-doan-so-theo-ky/ {
  #   proxy_pass http://127.0.0.1:3000/bao-cao-doan-so-theo-ky/;
  #   proxy_http_version 1.1;
  #   proxy_set_header Upgrade $http_upgrade;
  #   proxy_set_header Connection 'upgrade';
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto https;
  # }

  # Zalo
  location /zalo/ {
    proxy_pass http://127.0.0.1:3000/zalo/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # Mobile
  location /mobile/ {
    proxy_pass http://127.0.0.1:3000/mobile/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # Static uploads
  location /uploads/ {
    alias /var/www/qlcd/uploads/;   # nên dùng /var/www thay vì /root
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin *;
  }

  # Catch-all for other backend routes  
  location ~* ^/(auth|users|organizations|roles|events|reports|statistics|notifications|logs|system) {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # Root - serve static files or proxy remaining API routes
  location / {
    try_files $uri $uri/ @backend;
  }

  location @backend {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
