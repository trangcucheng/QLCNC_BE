version: '3.9'
services:
  db:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: cdcs@mysqlDevelop
      MYSQL_DATABASE: QLCongDoanCoSo

      MYSQL_USER: cdcsmysql
      MYSQL_PASSWORD: Qlvcbbn!@#

      MYSQL_AUTH_PLUGIN: mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - cdcs_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch_container
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - cdcs_network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana_container
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - cdcs_network

volumes:
  db_data:
  es_data:

networks:
  cdcs_network:
    driver: bridge
